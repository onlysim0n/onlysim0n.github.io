<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #alert-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .alert-box {
            background: rgba(20, 20, 20, 0.95);
            border: 5px solid #9146FF;
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.8);
            /* Změna: Box je viditelný jen když má třídu .show */
            display: none; 
            z-index: 9999;
        }

        .user-name { font-size: 54px; color: #9146FF; text-transform: uppercase; margin-bottom: 10px; }
        .reward-name { font-size: 28px; color: #00ffcc; }

        #test-btn { position: absolute; top: 10px; left: 10px; z-index: 10000; padding: 10px; }
    </style>
</head>
<body>

    <button id="test-btn" onclick="triggerAlert('TESTER', 'SOUND: Curak')">MANUÁLNÍ TEST</button>

    <div id="alert-container">
        <div id="alert-box" class="alert-box">
            <div id="user-name" class="user-name"></div>
            <div id="reward-name" class="reward-name"></div>
        </div>
    </div>

    <script>
        // --- 1. NASTAVENÍ (ZDE VLOŽ SVÉ ID) ---
        const CHANNEL_ID = 'TVOJE_ID_TADY'; 
        const AUTH_TOKEN = localStorage.getItem('gh_token'); 

        const soundConfig = {
            "SOUND: Curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            "Default": "https://www.myinstants.com/media/sounds/ding.mp3"
        };

        // --- 2. FUNKCE PRO ZOBRAZENÍ ---
        function triggerAlert(user, reward) {
            console.log("Spouštím alert pro:", user);
            const alertBox = document.getElementById('alert-box');
            
            document.getElementById('user-name').innerText = user;
            document.getElementById('reward-name').innerText = reward;

            // Přehrání zvuku
            const soundUrl = soundConfig[reward] || soundConfig["Default"];
            const audio = new Audio(soundUrl);
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Nutná interakce v OBS!"));

            // Zobrazení (natvrdo přes display)
            alertBox.style.display = 'block';
            
            // Schování po 6 sekundách
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 6000);
        }

        // --- 3. PŘIPOJENÍ ---
        function connect() {
            if (!AUTH_TOKEN) {
                const t = prompt("Vlož GitHub Token:");
                if (t) { localStorage.setItem('gh_token', t.trim()); location.reload(); }
                return;
            }

            const socket = new WebSocket('wss://pubsub-edge.twitch.tv');
            socket.onopen = () => {
                socket.send(JSON.stringify({
                    type: 'LISTEN',
                    data: { topics: [`channel-points-channel-v1.${CHANNEL_ID}`], auth_token: AUTH_TOKEN }
                }));
                setInterval(() => socket.send(JSON.stringify({ type: 'PING' })), 60000);
            };

            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === 'MESSAGE') {
                    const msg = JSON.parse(res.data.message);
                    triggerAlert(msg.data.redemption.user.display_name, msg.data.redemption.reward.title);
                }
            };
            socket.onclose = () => setTimeout(connect, 5000);
        }

        if (CHANNEL_ID !== 'TVOJE_ID_TADY') connect();
    </script>
</body>
</html>
