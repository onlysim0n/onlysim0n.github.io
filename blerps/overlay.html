<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Twitch Sound Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            padding: 0;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }
        #alert-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .alert-box {
            background: rgba(20, 20, 20, 0.95);
            border: 5px solid #9146FF;
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.8);
            
            /* Animace a viditelnost */
            opacity: 0;
            transform: scale(0.7);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        /* Třída, kterou přidáme pomocí JS pro zobrazení */
        .alert-box.show {
            opacity: 1;
            transform: scale(1);
        }
        .user-name {
            font-size: 54px;
            color: #9146FF;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 10px;
        }
        .reward-name {
            font-size: 28px;
            color: #00ffcc;
            text-shadow: 2px 2px 0px #000;
        }
        #test-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            opacity: 0.2;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="test-btn" onclick="triggerAlert('TEST_USER', 'SOUND: Curak')">TEST</button>

    <div id="alert-container">
        <div id="alert-box" class="alert-box">
            <div id="user-name" class="user-name"></div>
            <div id="reward-name" class="reward-name"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURACE - DOPLŇ SVOJE ID
        // ==========================================
        const CHANNEL_ID = '142761052'; // <--- TADY VLOŽ TO ČÍSLO
        const AUTH_TOKEN = localStorage.getItem('gh_token'); 

        const soundConfig = {
            "SOUND: Curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            "Default": "https://www.myinstants.com/media/sounds/ding.mp3"
        };

        // ==========================================
        // 2. LOGIKA ZOBRAZENÍ
        // ==========================================
        function triggerAlert(user, reward) {
            const alertBox = document.getElementById('alert-box');
            const userText = document.getElementById('user-name');
            const rewardText = document.getElementById('reward-name');

            // Vyplnění textu
            userText.innerText = user;
            rewardText.innerText = reward;

            // Zvuk
            const soundUrl = soundConfig[reward] || soundConfig["Default"];
            const audio = new Audio(soundUrl);
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Interakce nutná!"));

            // Zobrazení (přidáním CSS třídy)
            alertBox.classList.add('show');
            
            // Schování po 6 sekundách
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 6000);
        }

        // ==========================================
        // 3. TWITCH PŘIPOJENÍ
        // ==========================================
        function connect() {
            if (!AUTH_TOKEN) {
                const tokenInput = prompt("Vlož svůj GitHub Personal Access Token:");
                if (tokenInput) {
                    localStorage.setItem('gh_token', tokenInput.trim());
                    location.reload();
                }
                return;
            }

            const socket = new WebSocket('wss://pubsub-edge.twitch.tv');

            socket.onopen = () => {
                socket.send(JSON.stringify({
                    type: 'LISTEN',
                    data: {
                        topics: [`channel-points-channel-v1.${CHANNEL_ID}`],
                        auth_token: AUTH_TOKEN
                    }
                }));
                setInterval(() => socket.send(JSON.stringify({ type: 'PING' })), 60000);
            };

            socket.onmessage = (event) => {
                const response = JSON.parse(event.data);
                if (response.type === 'PONG') return;

                if (response.type === 'MESSAGE') {
                    const msgData = JSON.parse(response.data.message);
                    
                    // Získání jména a názvu odměny z dat od Twitche
                    const twitchUser = msgData.data.redemption.user.display_name;
                    const twitchReward = msgData.data.redemption.reward.title;
                    
                    triggerAlert(twitchUser, twitchReward);
                }
            };

            socket.onclose = () => setTimeout(connect, 5000);
        }

        if (CHANNEL_ID !== 'TVOJE_ID_TADY') {
            connect();
        }
