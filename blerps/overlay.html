<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #alert-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .alert-box {
            background: rgba(20, 20, 20, 0.95);
            border: 5px solid #9146FF;
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.8);
            display: none; 
            z-index: 9999;
        }
        .user-name { font-size: 54px; color: #9146FF; text-transform: uppercase; }
        .reward-name { font-size: 28px; color: #00ffcc; }
        #status { position: absolute; bottom: 5px; right: 5px; color: rgba(255,255,255,0.2); font-size: 10px; }
    </style>
</head>
<body>

    <div id="status">Odpojeno</div>

    <div id="alert-container">
        <div id="alert-box" class="alert-box">
            <div id="user-name" class="user-name"></div>
            <div id="reward-name" class="reward-name"></div>
        </div>
    </div>

    <script>
        // 1. KONFIGURACE
        const CHANNEL_ID = 'TVOJE_ID_CISLO'; // Sem dej to svoje číslo
        
        // Zvuky - na GitHub Pages používej raději HTTPS odkazy
        const soundConfig = {
            "SOUND: Curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            "Default": "https://www.myinstants.com/media/sounds/ding.mp3"
        };

        function triggerAlert(user, reward) {
            const alertBox = document.getElementById('alert-box');
            document.getElementById('user-name').innerText = user;
            document.getElementById('reward-name').innerText = reward;

            const soundUrl = soundConfig[reward] || soundConfig["Default"];
            const audio = new Audio(soundUrl);
            audio.play().catch(e => console.log("Nutná interakce"));

            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
        }

        function connect() {
            // Token se zeptá jen jednou a uloží se u tebe v prohlížeči (v OBS)
            let token = localStorage.getItem('twitch_token');
            if (!token) {
                token = prompt("Vlož svůj Twitch OAuth Token (získáš na twitchapps.com/tmi/):");
                if (token) {
                    localStorage.setItem('twitch_token', token.trim());
                } else return;
            }

            const socket = new WebSocket('wss://pubsub-edge.twitch.tv');

            socket.onopen = () => {
                document.getElementById('status').innerText = "Připojeno";
                socket.send(JSON.stringify({
                    type: 'LISTEN',
                    data: {
                        topics: [`channel-points-channel-v1.${CHANNEL_ID}`],
                        auth_token: token.replace('oauth:', '') // PubSub chce čistý kód
                    }
                }));
                setInterval(() => socket.send(JSON.stringify({ type: 'PING' })), 60000);
            };

            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === 'MESSAGE') {
                    const msg = JSON.parse(res.data.message);
                    if (msg.type === 'reward-redeemed') {
                        triggerAlert(
                            msg.data.redemption.user.display_name, 
                            msg.data.redemption.reward.title
                        );
                    }
                }
                if (res.error === "ERR_BADAUTH") {
                    localStorage.removeItem('twitch_token');
                    location.reload();
                }
            };

            socket.onclose = () => setTimeout(connect, 5000);
        }

        if (CHANNEL_ID !== 'TVOJE_ID_CISLO') connect();
    </script>
</body>
</html>
