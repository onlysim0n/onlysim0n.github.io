<!DOCTYPE html>
<html>
<head>
    <title>GitHub Overlay</title>
</head>
<body>
    <div id="status">Načítám...</div>

    <script>
        // 1. Zkusíme načíst token z paměti prohlížeče
        let ghToken = localStorage.getItem('gh_token');

        if (!ghToken) {
            // 2. Pokud token nemáme, vyžádáme ho (v reálu bys tu mohl mít input pole)
            ghToken = prompt("Zadej svůj GitHub Personal Access Token (uloží se navždy):");
            if (ghToken) {
                localStorage.setItem('gh_token', ghToken);
            }
        }

        // 3. Funkce pro volání GitHub API s uloženým tokenem
        async function fetchData() {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${ghToken}`
                    }
                });
                const data = await response.json();
                document.getElementById('status').innerText = `Přihlášen jako: ${data.login}`;
            } catch (error) {
                document.getElementById('status').innerText = "Chyba přihlášení. Zkontroluj token.";
            }
        }

        if (ghToken) fetchData();
    </script>
</body>
</html>
