<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Twitch & Kick Overlay</title>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
        }
        #alert-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .alert-box {
            background: rgba(20, 20, 20, 0.95);
            border: 5px solid #9146FF;
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            color: white;
            display: none; 
            z-index: 9999;
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.7);
        }
        .user-name { 
            font-size: 54px; 
            color: #9146FF; 
            text-transform: uppercase; 
            text-shadow: 3px 3px #000; 
        }
        .reward-name { 
            font-size: 28px; 
            color: #00ffcc; 
            margin-top: 10px; 
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="alert-container">
        <div id="alert-box" class="alert-box">
            <div id="user-name" class="user-name"></div>
            <div id="reward-name" class="reward-name"></div>
        </div>
    </div>

    <script>
        // =================================================
        // 1. KONFIGURACE - TADY VYPLŇ SVOJE ÚDAJE
        // =================================================
        const CHANNEL_ID = '142761052';     // Tvoje Twitch ID (číselné)
        const CHANNEL_NAME = 'only_sim0n';        // Tvůj nick na Twitchi (malými písmeny)
        const ALLOWED_USER = 'predni_k0l0';       // Nick uživatele, který smí spouštět !příkazy

        // SEZNAM ZVUKŮ (Přidávej další řádky podle potřeby)
        const soundConfig = {
            // Pro Twitch body (přesný název odměny)
            "SOUND: Curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            
            // Pro příkaz v chatu (např. co napíše tvůj bot)
            "!curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            
            // Záložní zvuk
            "default": "https://www.myinstants.com/media/sounds/ding.mp3"
        };

        const AUTH_TOKEN = localStorage.getItem('twitch_token');

        // =================================================
        // 2. FUNKCE PRO ZOBRAZENÍ ALERTU
        // =================================================
        function triggerAlert(user, key) {
            const soundUrl = soundConfig[key] || soundConfig["default"];
            if (!soundConfig[key] && !key.startsWith('!')) return;

            const alertBox = document.getElementById('alert-box');
            document.getElementById('user-name').innerText = user;
            document.getElementById('reward-name').innerText = key;

            const audio = new Audio(soundUrl);
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Klikni v OBS na 'Interagovat'!"));

            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
        }

        // =================================================
        // 3. ČTENÍ CHATU (PRO PŘÍKAZY / KICK BOT)
        // =================================================
        function connectChat() {
            const socket = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            socket.onopen = () => {
                socket.send('PASS SCHMOOPIE'); // Anonymní login
                socket.send(`NICK justinfan${Math.floor(Math.random() * 10000)}`);
                socket.send(`JOIN #${CHANNEL_NAME.toLowerCase()}`);
            };

            socket.onmessage = (event) => {
                if (event.data.includes('PRIVMSG')) {
                    const parts = event.data.split('!');
                    const user = parts[0].substring(1);
                    const msgPart = event.data.split('PRIVMSG')[1];
                    const message = msgPart.split(' :')[1].trim();

                    // Kontrola: Je to povolený uživatel a máme pro ten příkaz zvuk?
                    if (user.toLowerCase() === ALLOWED_USER.toLowerCase()) {
                        if (soundConfig[message]) {
                            triggerAlert("KICK REWARD", message);
                        }
                    }
                }
            };
            socket.onclose = () => setTimeout(connectChat, 5000);
        }

        // =================================================
        // 4. TWITCH BODY (PUBSUB)
        // =================================================
        function connectPubSub() {
            if (!AUTH_TOKEN) {
                const t = prompt("Vlož Twitch OAuth Token (získej na twitchapps.com/tmi/):");
                if (t) { localStorage.setItem('twitch_token', t.trim()); location.reload(); }
                return;
            }

            const socket = new WebSocket('wss://pubsub-edge.twitch.tv');
            socket.onopen = () => {
                socket.send(JSON.stringify({
                    type: 'LISTEN',
                    data: { 
                        topics: [`channel-points-channel-v1.${CHANNEL_ID}`], 
                        auth_token: AUTH_TOKEN.replace('oauth:', '') 
                    }
                }));
                setInterval(() => socket.send(JSON.stringify({ type: 'PING' })), 60000);
            };

            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === 'MESSAGE') {
                    const msg = JSON.parse(res.data.message);
                    if (msg.type === 'reward-redeemed') {
                        triggerAlert(msg.data.redemption.user.display_name, msg.data.redemption.reward.title);
                    }
                }
            };
            socket.onclose = () => setTimeout(connectPubSub, 5000);
        }

        // Start
        if (CHANNEL_ID !== 'TVOJE_ID_CISLO') {
            connectChat();
            connectPubSub();
        }
    </script>
</body>
</html>
