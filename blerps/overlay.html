<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; margin: 0; padding: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #alert-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* TLAČÍTKO PRO TEST (V OBS ho uvidíš přes Interagovat) */
        #debug-btn { 
            position: absolute; top: 20px; left: 20px; padding: 15px; 
            background: #9146FF; color: white; border: none; cursor: pointer; z-index: 10001;
        }

        .alert-box {
            background: rgba(20, 20, 20, 0.95);
            border: 5px solid #9146FF;
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            color: white;
            display: none; 
            z-index: 9999;
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.7);
        }
        .user-name { font-size: 54px; color: #9146FF; text-transform: uppercase; }
        .reward-name { font-size: 28px; color: #00ffcc; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="debug-btn" onclick="testSound()">KLIKNI PRO TEST ZVUKU</button>

    <div id="alert-container">
        <div id="alert-box" class="alert-box">
            <div id="user-name" class="user-name"></div>
            <div id="reward-name" class="reward-name"></div>
        </div>
    </div>

    <script>
        // --- NASTAVENÍ ---
        const CHANNEL_ID = '142761052'; 
        const CHANNEL_NAME = 'only_sim0n'; 
        const ALLOWED_USER = 'predni_k0l0'; 

        const soundConfig = {
            "SOUND: Curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3",
            "!curak": "https://www.myinstants.com/media/sounds/dpp-nastup-postizeneho.mp3"
        };

        // --- FUNKCE PRO TEST ---
        function testSound() {
            console.log("Testuji zvuk...");
            triggerAlert("TESTER", "!curak");
        }

        function triggerAlert(user, key) {
            const soundUrl = soundConfig[key];
            if (!soundUrl) {
                console.error("Zvuk pro klíč '" + key + "' nebyl nalezen!");
                return;
            }

            const alertBox = document.getElementById('alert-box');
            document.getElementById('user-name').innerText = user;
            document.getElementById('reward-name').innerText = key;

            const audio = new Audio(soundUrl);
            audio.volume = 1.0;
            
            // Důležité: play() vrací promise, odchytíme chybu
            audio.play()
                .then(() => {
                    console.log("Zvuk se přehrává");
                    alertBox.style.display = 'block';
                    setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
                })
                .catch(e => {
                    alert("CHYBA: Prohlížeč zablokoval zvuk. Musíš na stránku nejdřív kliknout!");
                    console.error(e);
                });
        }

        // --- ZBYTEK KÓDU (CHAT + PUBSUB) ---
        // (Zde nechte ty funkce connectChat() a connectPubSub() z minulého kódu)
        // ... (zkráceno pro přehlednost, ale v souboru je nechte)
    </script>
</body>
</html>
