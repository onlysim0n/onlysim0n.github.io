<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only_Sim0n | My Blerps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="../assets/loga/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Only_Sim0n</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="../index.html">About</a></li>
                <li><a href="../ateam/index.html">A-TEAM</a></li>
                <li><a href="../stream/index.html">Stream</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
                <li><a href="../setup/index.html">Setup</a></li>
                <li><a href="index.html" class="active">Blerp</a></li>
            </ul>
        </nav>
    </header>

    <main class="blerp-section">
        <h1>MY SOUNDBOARD</h1>
        
        <div class="sound-grid">
            <button class="sound-btn" onclick="playSound('kekw.mp3')">
                <span class="btn-icon">😂</span>
                <span class="btn-text">KEKW</span>
            </button>

            <button class="sound-btn" onclick="playSound('bruh.mp3')">
                <span class="btn-icon">💀</span>
                <span class="btn-text">BRUH</span>
            </button>

            <button class="sound-btn" onclick="playSound('wow.mp3')">
                <span class="btn-icon">⭐</span>
                <span class="btn-text">WOW</span>
            </button>

            <button class="sound-btn" onclick="playSound('fail.mp3')">
                <span class="btn-icon">👎</span>
                <span class="btn-text">FAIL</span>
            </button>
        </div>
    </main>

    <script>
        function playSound(fileName) {
            // Cesta směřuje do složky sounds uvnitř tvé složky blerps
            let audio = new Audio('sounds/' + fileName);
            audio.play().catch(error => {
                console.error("Chyba při přehrávání: Zkontroluj, zda soubor existuje v blerps/sounds/", error);
            });
        }
    </script>

</body>
</html>
