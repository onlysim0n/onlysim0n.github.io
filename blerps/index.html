<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only_Sim0n | Live Blerp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="../assets/loga/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Only_Sim0n</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="../index.html">About</a></li>
                <li><a href="../ateam/index.html">A-TEAM</a></li>
                <li><a href="../stream/index.html">Stream</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
                <li><a href="../setup/index.html">Setup</a></li>
                <li><a href="index.html" class="active">Blerp</a></li>
            </ul>
        </nav>
    </header>

    <main class="blerp-section">
        <h1>LIVE SOUNDBOARD</h1>
        <div id="status" style="color: #555; margin-bottom: 20px; font-size: 0.8rem;">Připojování k Twitchi...</div>
        
        <div class="sound-grid">
            <button class="sound-btn" onclick="playSound('kekw.mp3')">
                <span class="btn-icon">😂</span>
                <span class="btn-text">KEKW</span>
            </button>
            <button class="sound-btn" onclick="playSound('bruh.mp3')">
                <span class="btn-icon">💀</span>
                <span class="btn-text">BRUH</span>
            </button>
        </div>
    </main>

    <script>
        // Nastavení tvého kanálu
        const twitchChannel = "TVŮJ_NICK_NA_TWITCHI"; 

        // Funkce pro přehrání zvuku ze složky sounds/
        function playSound(fileName) {
            let audio = new Audio('sounds/' + fileName);
            audio.play().catch(e => console.error("Chyba přehrávání:", e));
        }

        // Posluchač na Twitch odměny za body
        ComfyJS.onReward = (user, reward, cost, message, extra) => {
            console.log(`Odměna: ${reward}`);

            // Podmínky: Název musí přesně odpovídat názvu odměny na Twitchi
            if (reward === "KEKW") {
                playSound('kekw.mp3');
            } 
            else if (reward === "BRUH") {
                playSound('bruh.mp3');
            }
        };

        // Inicializace připojení
        ComfyJS.Init(twitchChannel);
        
        ComfyJS.onConnected = () => {
            document.getElementById("status").innerText = "Propojeno s kanálem: " + twitchChannel;
        };
    </script>
</body>
</html>
