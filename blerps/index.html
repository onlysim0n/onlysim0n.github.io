<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only_Sim0n | Live Blerp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-box">
            <span class="logo-text">Only_Sim0n</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Blerp</a></li>
            </ul>
        </nav>
    </header>

    <main class="blerp-section">
        <h1>LIVE SOUNDBOARD</h1>
        
        <div id="status" style="margin-bottom: 10px; font-weight: bold;">Status: Odpojeno</div>
        
        <button id="login-btn" style="padding: 15px 30px; margin-bottom: 30px; cursor: pointer; background: #9146FF; border: none; color: white; font-weight: bold; border-radius: 5px; display: block;">
            LOGIN TO TWITCH
        </button>

        <div class="sound-grid">
            <button class="sound-btn" onclick="playSound('Agraelus_curak.mp3')">
                <span class="btn-icon">🔊</span>
                <span class="btn-text">SOUND: Curak</span>
            </button>
        </div>
    </main>

    <script>
        // --- TVOJE KONFIGURACE ---
        const CLIENT_ID = '03f7yjg63ezj42dtqr3i4oiqz550bm'; 
        const CHANNEL = 'only_sim0n';
        // Automaticky detekuje tvou adresu na GitHubu (https://onlysim0n.github.io/blerps/)
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const statusEl = document.getElementById('status');
        const loginBtn = document.getElementById('login-btn');

        // 1. Kontrola, zda se vracíme z Twitche s tokenem
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (!accessToken) {
            // Pokud nemáme token, nastavíme tlačítko pro přihlášení
            loginBtn.addEventListener('click', () => {
                const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=channel:read:redemptions+chat:read`;
                window.location.href = authUrl;
            });
        } else {
            // Máme token! Schováme tlačítko a spustíme propojení
            loginBtn.style.display = 'none';
            statusEl.innerText = "Status: Autorizuji připojení...";
            initComfy(accessToken);
            
            // Vyčistíme URL od tokenu pro bezpečnost
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        function initComfy(token) {
            // Nastavení reakce na odměny
            ComfyJS.onReward = (user, reward, cost, message, extra) => {
                console.log("Twitch detekoval odměnu:", reward);
                
                // Musí se jmenovat PŘESNĚ jako na Twitchi
                if (reward === "SOUND: Curak") {
                    playSound("Agraelus_curak.mp3");
                }
            };

            // Připojení pomocí tvého jména a tokenu
            ComfyJS.Init(CHANNEL, "oauth:" + token);

            ComfyJS.onConnected = () => {
                statusEl.innerText = "Status: PŘIHLÁŠEN ✅ (Kanál: " + CHANNEL + ")";
                statusEl.style.color = "#00ff00";
                console.log("Úspěšně propojeno s Twitchem přes OAuth!");
            };
        }

        function playSound(file) {
            const audio = new Audio('sounds/' + file);
            audio.play().catch(err => {
                console.error("Chyba: Prohlížeč blokuje zvuk. Klikni nejdřív kamkoliv na stránku!", err);
            });
        }
    </script>
</body>
</html>
